events {}

http {
    log_format defense '$remote_addr - [$time_local] "$request" '
                       'status=$status bytes=$body_bytes_sent '
                       'rt=$request_time upstream=$upstream_addr '
                       'ustatus=$upstream_status limit=$limit_req_status';

    access_log /var/log/nginx/access.log defense;
    error_log /var/log/nginx/error.log warn;

    # 每个 IP 平均每秒最多 5 个请求
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=5r/s;

    # 每个 IP 最多 20 个并发连接
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # 超过限流时返回 429 Too Many Requests
    limit_req_status 429;

    upstream waf_backend {
        server waf:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # 基础抗慢速请求设置
        client_body_timeout 10s;
        client_header_timeout 10s;
        keepalive_timeout 15s;
        send_timeout 10s;
        client_max_body_size 2m;

        add_header X-Defense-Layer "nginx-edge-rate-limit" always;

        location /health {
            return 200 "edge ok\n";
        }

        location / {
            limit_req zone=per_ip burst=10 nodelay;
            limit_conn conn_per_ip 20;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://waf_backend;
        }
    }
}
